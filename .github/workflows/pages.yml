name: pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build demo dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: setup.py

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pandas>=1.5.0" numpy
          python -m pip install -e .

      - name: Render demo dashboard
        run: |
          mkdir -p site
          python scripts/generate_demo_dashboard.py --output site/index.html
          # Include the checked-in copy too, and a tiny landing blurb.
          cp docs/examples/dashboard_demo.html site/dashboard_demo.html
          cat > site/about.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <title>casetrack demo dashboard</title>
          <body style="font:14px -apple-system,Roboto,sans-serif;max-width:640px;margin:40px auto;padding:0 16px;color:#1a202c">
          <h1>casetrack demo dashboard</h1>
          <p>This page is a rendered example of <code>casetrack dashboard</code>
          against a simulated ONT long-read project (24 samples, 6 analyses).
          The HTML is fully self-contained — no network, no JavaScript
          libraries. <a href="./">Open the dashboard &rarr;</a></p>
          <p>Source: <a href="https://github.com/sahuno/casetrack">github.com/sahuno/casetrack</a></p>
          </body>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
