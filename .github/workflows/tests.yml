name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest · py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: setup.py

      - name: Install test + optional-export deps
        run: |
          python -m pip install --upgrade pip
          # Core runtime dep + test runner + extras exercised by the suite
          # (openpyxl for xlsx export, pyarrow for parquet export,
          # duckdb for `casetrack query`).
          python -m pip install "pandas>=1.5.0" pytest openpyxl pyarrow duckdb

      - name: Install casetrack
        run: python -m pip install -e .

      - name: Show environment
        run: |
          python --version
          python -c "import pandas, sys; print('pandas', pandas.__version__)"
          which casetrack && casetrack --help | head -3

      - name: Run tests
        run: python -m pytest tests/ -v --durations=10
