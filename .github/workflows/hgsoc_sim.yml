name: hgsoc_sim-smoke

# Lightweight smoke test for the examples/hgsoc_sim/ scaffold. Runs the
# container-free steps (YAML → VISOR BED expansion) on every PR that
# touches the demo. Does NOT run VISOR / Badread / NanoSim / minimap2 —
# those need containers or a much larger runner image.
#
# Catches: config.yaml regressions, 01_prepare_visor_beds.py logic bugs,
# unintended directory-layout changes, multi-assay schema drift. Runs
# in ~10s.

on:
  push:
    branches: [main]
    paths:
      - "examples/hgsoc_sim/**"
      - ".github/workflows/hgsoc_sim.yml"
  pull_request:
    branches: [main]
    paths:
      - "examples/hgsoc_sim/**"
      - ".github/workflows/hgsoc_sim.yml"
  workflow_dispatch: {}

concurrency:
  group: hgsoc-sim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: bed-expansion-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (pyyaml only)
        run: python -m pip install pyyaml

      - name: Shell-lint the scripts
        run: |
          # Catches all numbered steps (00, 00b, 00c, 01, 02, …) + the driver.
          for s in examples/hgsoc_sim/scripts/*.sh examples/hgsoc_sim/run_demo.sh; do
            bash -n "$s" && echo "OK: $s"
          done

      - name: Python-compile the scripts
        run: |
          for py in examples/hgsoc_sim/scripts/*.py; do
            python -m py_compile "$py"
          done

      - name: Run 01_prepare_visor_beds.py into a tmpdir
        run: |
          python examples/hgsoc_sim/scripts/01_prepare_visor_beds.py \
            --sandbox "${RUNNER_TEMP}/hgsoc_sim_smoke"

      - name: Assert expected cohort shape (multi-assay)
        run: |
          python <<'PY'
          import os
          from pathlib import Path
          import yaml

          sandbox = Path(os.environ["RUNNER_TEMP"]) / "hgsoc_sim_smoke"
          root = sandbox / "cohort"
          cfg = yaml.safe_load(
              Path("examples/hgsoc_sim/config.yaml").read_text()
          )
          valid_contigs = {s["name"] for s in cfg["reference"]["slices"]}
          n_slices = len(valid_contigs)

          # Build the expected (patient, specimen, assay_type) triples from
          # config.yaml, skipping any non-DNA assay (those are handled by
          # a different script in phase f).
          DNA_TYPES = {"ONT-DNA"}
          expected: set[tuple[str, str, str]] = set()
          for patient in cfg["cohort"]:
              pid = patient["patient_id"]
              for spec in patient["specimens"]:
                  suffix = spec["id_suffix"]
                  for a in spec.get("assays") or []:
                      if a["type"] in DNA_TYPES:
                          expected.add((pid, suffix, a["type"]))

          # Collect the actual triples from the emitted directory tree.
          got: set[tuple[str, str, str]] = set()
          for p in root.iterdir():
              if not p.is_dir():
                  continue
              for s in p.iterdir():
                  if not s.is_dir():
                      continue
                  for a in s.iterdir():
                      if a.is_dir() and (a / "regions.laser.bed").exists():
                          got.add((p.name, s.name, a.name))

          assert got == expected, f"cohort shape drift: {got} != {expected}"

          # Every DNA assay must have both haplotype HACk BEDs + LASeR BED.
          for patient, specimen, assay in expected:
              adir = root / patient / specimen / assay
              for required in ("haplotype1.hack.bed",
                               "haplotype2.hack.bed",
                               "regions.laser.bed"):
                  assert (adir / required).exists(), f"missing {adir}/{required}"

          # HACk BEDs must be 6-col on declared contigs; LASeR must be 5-col
          # with one row per slice.
          for bed in root.rglob("*.hack.bed"):
              for line in bed.read_text().splitlines():
                  if not line.strip():
                      continue
                  cols = line.split("\t")
                  assert len(cols) == 6, f"{bed}: expected 6 cols, got {len(cols)}"
                  assert cols[0] in valid_contigs, (
                      f"{bed}: variant on unknown contig {cols[0]!r}"
                  )
          for bed in root.rglob("*.laser.bed"):
              lines = [l for l in bed.read_text().splitlines() if l.strip()]
              assert len(lines) == n_slices, (
                  f"{bed}: expected {n_slices} rows, got {len(lines)}"
              )
              for line in lines:
                  cols = line.split("\t")
                  assert len(cols) == 5, f"{bed}: expected 5 cols, got {len(cols)}"

          # Variant count sanity check: for each DNA assay, germline +
          # (somatic if tumor) must match the HACk BED line total.
          cohort = {p["patient_id"]: p for p in cfg["cohort"]}
          for patient, specimen, assay in expected:
              p = cohort[patient]
              n_germ = len(p.get("germline", []))
              n_som = len(p.get("somatic", []))
              expected_n = n_germ + (n_som if specimen == "tumor" else 0)
              adir = root / patient / specimen / assay
              h1 = [l for l in (adir / "haplotype1.hack.bed").read_text().splitlines()
                    if l.strip()]
              h2 = [l for l in (adir / "haplotype2.hack.bed").read_text().splitlines()
                    if l.strip()]
              got_n = len(h1) + len(h2)
              assert got_n == expected_n, (
                  f"{patient}/{specimen}/{assay}: expected {expected_n} variants, "
                  f"got {got_n}"
              )

          print(f"OK: {len(expected)} DNA assay(s) verified across "
                f"{len(set((p,s) for p,s,_ in expected))} specimen(s); "
                f"BED formats + variant counts match config.yaml.")
          PY
