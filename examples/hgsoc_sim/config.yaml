# hgsoc_sim cohort definition — one YAML for the whole simulation.
#
# scripts/01_prepare_visor_beds.py turns this into per-assay VISOR BED
# files. Coordinates are 0-based half-open (BED convention).
#
# ── Layout (v0.4.2) ───────────────────────────────────────────────────────────
# Each specimen lists its assays — typically ONT-DNA and ONT-RNA side by side.
# Every assay gets its own directory under cohort/<PATIENT>/<SPECIMEN>/<ASSAY>/
# so DNA and RNA lanes never share working files.
#
# The demo pipeline branches by assay type:
#   ONT-DNA  →  VISOR HACk → Badread (R10.4.1 genomic) → minimap2 map-ont
#   ONT-RNA  →  NanoSim cDNA (R10.4.1) → minimap2 splice              (phase f)
#
# Reference is a concatenation of small GRCh38 slices, each renamed to its
# own contig. The BRCA1 slice (~1 Mb) and TP53 slice (~100 kb) together
# cover the two most common HGSOC driver loci.
#
# ── Variant types supported by VISOR HACk (subset) ────────────────────────────
#   SNP           - single-nucleotide substitution (alt required)
#   deletion      - straight deletion of the region (length required)
#   insertion     - literal insert (alt = sequence string)
#   inversion     - inversion of the region (length required)
#   duplication   - tandem dup of the region (length required)

reference:
  source_url: "https://ftp.ensembl.org/pub/release-110/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.chromosome.17.fa.gz"
  # Each slice produces a renamed contig in the simulated reference FASTA.
  # Keep slices small — simulation cost scales linearly with total length.
  slices:
    - name: chr17_brca1
      chrom: chr17
      start: 42500000       # 0-based, inclusive
      end:   43500000       # exclusive → 1 Mb, covers BRCA1 (chr17:43.04M-43.17M)
    - name: chr17_tp53
      chrom: chr17
      start: 7600000
      end:   7700000        # 100 kb, covers TP53 (chr17:7.66M-7.69M)

cohort:
  - patient_id: HGSOC_SIM_01
    # Complete pair — both specimens sim'd at healthy coverage and pass QC.
    germline:
      - { chrom: chr17_brca1, pos: 150000, type: SNP, alt: T, note: "het SNP upstream of BRCA1" }
    somatic:
      - { chrom: chr17_brca1, pos: 550000, type: SNP, alt: A, note: "BRCA1 LOF proxy" }
      - { chrom: chr17_brca1, pos: 560000, type: deletion, length: 50, note: "50 bp intragenic del" }
      - { chrom: chr17_tp53,  pos: 70000,  type: SNP, alt: T, note: "TP53 R248-like hotspot proxy" }
    specimens:
      - id_suffix: normal
        tissue_site: normal
        assays:
          - type: ONT-DNA
            coverage: 25
            purity: 100      # no tumor contamination — pure germline
          # RNA landing in phase f:
          # - type: ONT-RNA
          #   depth: 30
          #   expression_profile: baseline
      - id_suffix: tumor
        tissue_site: tumor
        assays:
          - type: ONT-DNA
            coverage: 35
            purity: 70       # 30% normal contamination

  - patient_id: HGSOC_SIM_02
    # Broken pair — normal RNA deliberately truncated in phase g so
    # `qc_pass=False` fires on its autoflag. DNA passes in this patient.
    germline:
      - { chrom: chr17_brca1, pos: 120000, type: SNP, alt: C, note: "het SNP upstream of BRCA1" }
    somatic:
      - { chrom: chr17_tp53,  pos: 60000,  type: SNP, alt: G, note: "TP53 R175-like hotspot proxy" }
    specimens:
      - id_suffix: normal
        tissue_site: normal
        assays:
          - type: ONT-DNA
            coverage: 25
            purity: 100
      - id_suffix: tumor
        tissue_site: tumor
        assays:
          - type: ONT-DNA
            coverage: 30
            purity: 75

  - patient_id: HGSOC_SIM_03
    # Singleton — tumor only, no normal produced. Surfaces via cohort
    # --pair-by tissue_site as "singleton".
    germline:
      - { chrom: chr17_brca1, pos: 180000, type: SNP, alt: G, note: "het SNP upstream of BRCA1" }
    somatic:
      - { chrom: chr17_brca1, pos: 570000, type: SNP, alt: T, note: "BRCA1 LOF proxy #2" }
      - { chrom: chr17_brca1, pos: 600000, type: duplication, length: 1000, note: "1 kb tandem dup" }
      - { chrom: chr17_tp53,  pos: 80000,  type: SNP, alt: C, note: "TP53 R273-like hotspot proxy" }
    specimens:
      - id_suffix: tumor
        tissue_site: tumor
        assays:
          - type: ONT-DNA
            coverage: 30
            purity: 80
